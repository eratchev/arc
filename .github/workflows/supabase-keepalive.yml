name: Supabase keep-alive

on:
  schedule:
    # Every 3 days at 08:00 UTC (Supabase pauses after 7 days of inactivity)
    - cron: '0 8 */3 * *'
  workflow_dispatch: # allow manual trigger

jobs:
  ping:
    name: Ping Supabase REST API
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase with a real query
        run: |
          echo "Pinging Supabase..."
          response=$(curl --silent --show-error --fail \
            --max-time 30 \
            --retry 3 --retry-delay 5 \
            "${{ secrets.SUPABASE_URL }}/rest/v1/embeddings?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "Response: $response"
          echo "Supabase is active."
